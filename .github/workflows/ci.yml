name: CI

on:
  push:
    branches: [ main-new ]
  pull_request:
    branches: [ main-new ]

jobs:
  build-and-test:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Run Tests
        run: |
          xcodebuild test \
            -project serevia.xcodeproj \
            -scheme serevia \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=17.5' \
            -only-testing:sereviaTests \
            | xcpretty

  lint:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint lint --config .swiftlint.yml
